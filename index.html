<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Simple Counter</title>
    
    <link rel="icon" href="image_13.png">
    <link rel="apple-touch-icon" href="image_13.png">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #fff; margin: 0; color: #111; -webkit-font-smoothing: antialiased; overflow: hidden; touch-action: manipulation; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 380px; height: 100vh; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        /* タイトル */
        h1 { font-size: 1.2rem; font-weight: 800; color: #aaa; margin: 40px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* タップ領域（メインアクション） */
        #tap-area { width: 100%; height: 60vh; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.02); border-radius: 20px; }
        
        /* カウント数字（中央配置） */
        #count { font-size: 140px; font-weight: 800; letter-spacing: -6px; margin: 0; transition: transform 0.05s ease-out; color: #111; }
        .bump { transform: scale(1.08); }

        /* 操作パネル（フッターの上に配置） */
        #controls { width: 100%; display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .btn-sub { width: 65px; height: 65px; background-color: #f0f0f0; border: none; border-radius: 18px; font-size: 26px; font-weight: 700; color: #666; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-appearance: none; transition: 0.1s; }
        .btn-sub:active { transform: scale(0.92); background-color: #e0e0e0; }
        
        /* フッター */
        footer { width: 100%; padding-bottom: 30px; text-align: center; font-size: 0.7rem; color: #aaa; line-height: 1.8; border-top: 1px solid #eee; background: #fff; margin-top: auto; }
        .install-btn { background: #f0f0f0; color: #111; border: none; padding: 12px 24px; border-radius: 25px; font-weight: 700; cursor: pointer; margin-bottom: 20px; font-size: 0.8rem; -webkit-appearance: none; transition: 0.2s; }
        .install-btn:active { background: #e0e0e0; }

        /* ポップアップ（モーダル）のデザインを他と完全に統一（1枚目スタイル） */
        #install-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 85%; max-width: 300px; position: relative; text-align: left; }
        .btn-close-modal { position: absolute; top: 15px; right: 15px; background:none; border:none; font-size:22px; color: #ccc; cursor: pointer; -webkit-appearance: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Simple Counter</h1>
    
    <div id="tap-area" onclick="add(1)">
        <p id="count">0</p>
    </div>

    <div id="controls">
        <button class="btn-sub" onclick="add(-1)">−</button>
        <button class="btn-sub" onclick="resetCount()">C</button>
    </div>

    <footer>
        <button class="install-btn" onclick="showInstall()">📱 Add to Home Screen</button>
        <div class="footer-line">No login / No tracking / Browser only</div>
        <div class="footer-line">No server / No Ads</div>
        <div class="footer-line">Privacy Policy</div>
        <div style="margin-top: 15px;">Simple Counter © 2026</div>
    </footer>
</div>

<div id="install-modal" onclick="hideInstall()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="btn-close-modal" onclick="hideInstall()">✕</button>
        <h2 style="font-size: 1.2rem; margin-top:0; font-weight: 800;">📱 Install</h2>
        <p style="font-size: 0.85rem; color: #555; line-height: 1.6;">Add to your home screen.</p>
        <div style="font-size: 0.8rem; background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top:15px; border: 1px solid #eee;">
            <p style="margin: 0 0 10px 0;"><strong>🍏 iPhone (Safari):</strong><br>Tap <strong>Share</strong>, then <strong>Add to Home Screen</strong>.</p>
            <p style="margin: 0;"><strong>🤖 Android (Chrome):</strong><br>Tap <strong>Menu (⋮)</strong>, then <strong>Add to Home screen</strong>.</p>
        </div>
    </div>
</div>

<script>
    let n = 0;
    const countEl = document.getElementById('count');

    function add(val) {
        n = Math.max(0, n + val); // 0以下にはならない
        countEl.innerText = n;
        
        // アニメーション効果（ bump をクラス追加して一瞬で消す）
        countEl.classList.remove('bump');
        void countEl.offsetWidth; 
        countEl.classList.add('bump');
        setTimeout(() => countEl.classList.remove('bump'), 50); // アニメーション時間を短縮
    }

    function resetCount() {
        // クリアボタン後のポップアップ（確認ダイアログ）を残す
        if(confirm("Reset count to 0?")) {
            n = 0;
            countEl.innerText = n;
        }
    }

    function showInstall() { document.getElementById('install-modal').style.display = 'flex'; }
    function hideInstall() { document.getElementById('install-modal').style.display = 'none'; }
</script>
</body>
</html>
