<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Simple Counter</title>
    
    <link rel="icon" href="image_7.png">
    <link rel="apple-touch-icon" href="image_7.png">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fff; margin: 0; color: #111; -webkit-font-smoothing: antialiased; touch-action: manipulation; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 380px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; position: relative; padding: 0 20px; box-sizing: border-box; }
        
        h1 { font-size: 1.1rem; font-weight: 800; color: #ccc; margin: 40px 0 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Tap Area */
        #tap-area { width: 100%; height: 45vh; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.02); border-radius: 20px; transition: background 0.1s; -webkit-tap-highlight-color: transparent; }
        #tap-area:active { background: rgba(0,0,0,0.05); }
        
        #count { font-size: 140px; font-weight: 800; letter-spacing: -6px; margin: 0; transition: transform 0.05s ease-out; color: #111; user-select: none; }
        .bump { transform: scale(1.08); }

        /* Controls */
        #controls { width: 100%; display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .btn-sub { width: 65px; height: 65px; background-color: #f0f0f0; border: none; border-radius: 18px; font-size: 26px; font-weight: 700; color: #666; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-appearance: none; transition: 0.1s; }
        .btn-sub:active { transform: scale(0.92); background-color: #e0e0e0; }
        
        /* Fridge Combo Standard Footer */
        footer { width: 100%; margin-top: auto; padding: 40px 0 20px; text-align: center; font-size: 13px; color: #666; border-top: 1px solid #f0f0f0; }
        .kofi-btn { display: inline-block; background: #111; color: #fff; padding: 12px 24px; border-radius: 15px; text-decoration: none; font-weight: bold; margin-bottom: 20px; transition: 0.2s; }
        .install-btn { background: #f0f0f0; color: #111; border: none; padding: 8px 20px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: 500; margin-bottom: 20px; }
        .footer-line { line-height: 1.8; color: #999; }

        /* Unified Install Modal */
        #install-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 85%; max-width: 300px; position: relative; text-align: center; }
        .btn-close-modal { position: absolute; top: 15px; right: 15px; background:none; border:none; font-size:20px; color: #999; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Simple Counter</h1>
    
    <div id="tap-area" onclick="add(1)">
        <p id="count">0</p>
    </div>

    <div id="controls">
        <button class="btn-sub" onclick="add(-1)">−</button>
        <button class="btn-sub" onclick="resetCount()">C</button>
    </div>

    <footer>
        <a href="https://ko-fi.com/afrorakda" target="_blank" rel="noopener" class="kofi-btn">☕ Support me on Ko-fi</a>
        <div>
            <button class="install-btn" onclick="showInstall()">Add to Home Screen</button>
        </div>
        <div class="footer-line">
            <div>No login / No tracking / No ads / Browser only</div>
            <div>Privacy Policy</div>
            <div style="margin-top: 10px; font-weight: bold; color: #111;">Simple Counter © 2026</div>
        </div>
    </footer>
</div>

<div id="install-modal" onclick="hideInstall()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="btn-close-modal" onclick="hideInstall()">✕</button>
        <h2 style="font-size: 1.2rem; margin-top:0; display: flex; align-items: center; justify-content: center; gap: 8px;">
            📱 Install
        </h2>
        <p style="font-size: 0.85rem; color: #555; margin-bottom: 15px;">Add to your home screen.</p>
        <div style="text-align: left; font-size: 0.8rem; background: #f9f9f9; padding: 18px; border-radius: 12px;">
            <div style="margin-bottom: 12px; display: flex; align-items: start; gap: 8px;">
                <span>🍏</span>
                <div>
                    <strong>iPhone (Safari):</strong><br>
                    Tap <strong>Share</strong>, then <strong>Add to Home Screen</strong>.
                </div>
            </div>
            <div style="display: flex; align-items: start; gap: 8px;">
                <span>🤖</span>
                <div>
                    <strong>Android (Chrome):</strong><br>
                    Tap <strong>Menu (⋮)</strong>, then <strong>Add to Home screen</strong>.
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let n = 0;
    const countEl = document.getElementById('count');

    function add(val) {
        n = Math.max(0, n + val);
        countEl.innerText = n;
        
        countEl.classList.remove('bump');
        void countEl.offsetWidth; 
        countEl.classList.add('bump');
        setTimeout(() => countEl.classList.remove('bump'), 50);
    }

    function resetCount() {
        if(confirm("Reset count to 0?")) {
            n = 0;
            countEl.innerText = n;
        }
    }

    function showInstall() { document.getElementById('install-modal').style.display = 'flex'; }
    function hideInstall() { document.getElementById('install-modal').style.display = 'none'; }
</script>
</body>
</html>
